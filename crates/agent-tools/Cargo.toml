[package]
name = "agent-tools"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["tool-core"]
# The always-useful trio: bash, read_file, write_file.
tool-core = []
# Surgical string-replace edit tool.
tool-edit = []
# Multi-file unified-diff ("V4A") patch tool: add/update/delete in one atomic call.
tool-patch = []
# gitignore-aware grep / find / ls (pulls in the `ignore` + `regex` crates).
tool-search = ["dep:ignore", "dep:regex"]
# The `search` tool over the SearchBackend seam (index-backed full-text search).
# The backend is wired by the runtime; this feature only compiles the tool.
tool-search-index = []
# The git tools over the RepoBackend seam (multi-branch object reads + worktrees).
# The backend is wired by the runtime; this feature only compiles the tools.
tool-git = []
# The `metrics` tool: lets the agent read its own live performance registry.
tool-metrics = ["dep:agent-metrics"]
# The `web_fetch` tool over the WebBackend seam (HTTP GET → sanitized text). The
# backend is wired by the runtime; this feature only compiles the tool + the
# dependency-free HTML sanitizer.
tool-web = []
# The `todo_write` tool over the TaskTracker seam (structured plan). The tracker
# is wired by the runtime; this feature only compiles the tool.
tool-todo = []
# Heap-leak/allocation assertions for tests/leak.rs (dhat global allocator). Off by
# default; the leak check runs `--features dhat-heap,tool-patch`.
dhat-heap = ["dep:dhat"]

[dependencies]
agent-core.workspace = true
agent-metrics = { workspace = true, optional = true }
async-trait.workspace = true
serde_json.workspace = true
tokio.workspace = true
ignore = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
# Optional heap profiler for tests/leak.rs (only under the `dhat-heap` feature).
dhat = { workspace = true, optional = true }

[dev-dependencies]
rstest.workspace = true
agent-testkit.workspace = true
iai-callgrind.workspace = true
# The `todo_write` tool test dogfoods the real in-memory TaskTracker backend.
agent-tasks = { workspace = true, features = ["tasks-memory"] }

# Deterministic instruction-count bench for the patch parser (see benches/patch.rs).
[[bench]]
name = "patch"
harness = false
required-features = ["tool-patch"]

# Deterministic bench for the edit hot path (exact + fuzzy line matching).
[[bench]]
name = "edit"
harness = false
required-features = ["tool-edit"]

# Deterministic bench for the web_fetch HTML sanitizer (tokenize → markdown/text).
[[bench]]
name = "web"
harness = false
required-features = ["tool-web"]
