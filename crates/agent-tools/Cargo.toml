[package]
name = "agent-tools"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["tool-core"]
# The always-useful trio: bash, read_file, write_file.
tool-core = []
# Surgical string-replace edit tool.
tool-edit = []
# gitignore-aware grep / find / ls (pulls in the `ignore` + `regex` crates).
tool-search = ["dep:ignore", "dep:regex"]
# The `search` tool over the SearchBackend seam (index-backed full-text search).
# The backend is wired by the runtime; this feature only compiles the tool.
tool-search-index = []
# The `metrics` tool: lets the agent read its own live performance registry.
tool-metrics = ["dep:agent-metrics"]

[dependencies]
agent-core.workspace = true
agent-metrics = { workspace = true, optional = true }
async-trait.workspace = true
serde_json.workspace = true
tokio.workspace = true
ignore = { workspace = true, optional = true }
regex = { workspace = true, optional = true }

[dev-dependencies]
rstest.workspace = true
agent-testkit.workspace = true
