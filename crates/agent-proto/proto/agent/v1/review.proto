// The `ReviewCollector` seam over gRPC — the fact-collection fan-out as a
// service. `Collect` runs every collector and returns a grounded `ReviewFacts`.
//
// `Review`-prefixed messages (the flat `agent.v1` package makes names global);
// `ChangeKind` is reused from repo.proto. See docs/design/code-review/.
syntax = "proto3";

package agent.v1;

import "agent/v1/repo.proto";

service FactCollectorService {
  // Collect grounded facts for a target. Fail-soft: a partial bundle is a
  // success; only an unresolvable target is an error.
  rpc Collect(ReviewCollectRequest) returns (ReviewFacts);
}

// The target, encoded: `pr:<n>` | `branch:<name>` | `worktree`.
message ReviewCollectRequest {
  string target = 1;
}

enum ReviewCollectStatus {
  REVIEW_COLLECT_STATUS_UNSPECIFIED = 0;
  REVIEW_COLLECT_STATUS_OK = 1;
  REVIEW_COLLECT_STATUS_PARTIAL = 2;
  REVIEW_COLLECT_STATUS_SKIPPED = 3;
  REVIEW_COLLECT_STATUS_FAILED = 4;
}

enum ReviewForgeHost {
  REVIEW_FORGE_HOST_UNSPECIFIED = 0;
  REVIEW_FORGE_HOST_GITHUB = 1;
  REVIEW_FORGE_HOST_GITLAB = 2;
  REVIEW_FORGE_HOST_OTHER = 3;
  REVIEW_FORGE_HOST_NONE = 4;
}

enum ReviewRepoRelation {
  REVIEW_REPO_RELATION_UNSPECIFIED = 0;
  REVIEW_REPO_RELATION_CLONE = 1;
  REVIEW_REPO_RELATION_FORK = 2;
  REVIEW_REPO_RELATION_UNKNOWN = 3;
}

enum ReviewRepoLanguage {
  REVIEW_REPO_LANGUAGE_UNSPECIFIED = 0;
  REVIEW_REPO_LANGUAGE_GO = 1;
  REVIEW_REPO_LANGUAGE_RUST = 2;
  REVIEW_REPO_LANGUAGE_MIXED = 3;
  REVIEW_REPO_LANGUAGE_UNKNOWN = 4;
}

message ReviewCollectorStatus {
  string collector = 1;
  ReviewCollectStatus status = 2;
  string reason = 3;
  uint32 duration_ms = 4;
}

message ReviewMeta {
  string repo_hash = 1;
  string base_rev = 2;
  string head_rev = 3;
  uint32 total_ms = 4;
  repeated ReviewCollectorStatus collectors = 5;
}

message ReviewChangedFile {
  string path = 1;
  ChangeKind change = 2;
  uint32 additions = 3;
  uint32 deletions = 4;
  bool is_binary = 5;
  string lang = 6;
  // Unified-diff hunks (bounded; empty for binary/omitted files). Untrusted.
  string patch = 7;
}

message ReviewCommit {
  string short = 1;
  string summary = 2;
  string body = 3;
  string author = 4;
  uint32 age_days = 5;
}

message ReviewChangeSet {
  string base_rev = 1;
  string head_rev = 2;
  repeated ReviewChangedFile files = 3;
  uint32 repo_file_count = 4;
  repeated ReviewCommit commits = 5;
}

message ReviewGitState {
  string remote_url_hash = 1;
  ReviewForgeHost host = 2;
  ReviewRepoRelation relationship = 3;
  string default_branch = 4;
  ReviewRepoLanguage project = 5;
}

// One static-analysis finding (a linter diagnostic). All fields are
// tool-derived and untrusted: `file` is repo-relative + confined, `message`
// bounded. `in_change` marks a finding on a file the change touched.
message ReviewAnalysisFinding {
  string tool = 1;
  string rule = 2;
  string severity = 3;
  string file = 4;
  uint32 line = 5;
  string message = 6;
  bool in_change = 7;
}

// The outcome of one linter invocation (`status`: ok | skipped | timeout |
// failed). Distinct from a finding — a clean or unrun tool still gets a run.
message ReviewAnalyzerRun {
  string tool = 1;
  string status = 2;
  string reason = 3;
  uint32 duration_ms = 4;
  uint32 finding_count = 5;
}

message ReviewAnalysisReport {
  string language = 1;
  repeated ReviewAnalyzerRun runs = 2;
  repeated ReviewAnalysisFinding findings = 3;
}

// One changed top-level function signature (the cheap AST subset). Tool-derived
// and untrusted: `file` is repo-relative + confined, `before`/`after` bounded.
message ReviewSignatureChange {
  string file = 1;
  string lang = 2;      // go | rust
  string kind = 3;      // added | removed | modified
  string name = 4;
  string before = 5;    // "" for added
  string after = 6;     // "" for removed
}

message ReviewSignatureReport {
  repeated ReviewSignatureChange changes = 1;
  uint32 files_scanned = 2;
  bool truncated = 3;
}

// One function/method node in the call graph. Tool-derived + untrusted: `file`
// is repo-relative + confined, strings bounded.
message ReviewCallGraphNode {
  uint32 id = 1;
  string package = 2;
  string name = 3;
  bool exported = 4;
  string file = 5;
  uint32 line = 6;
  double centrality = 7;
}

message ReviewCallEdge {
  uint32 caller_id = 1;
  uint32 callee_id = 2;
}

message ReviewPackageShape {
  string package = 1;
  uint32 files = 2;
  uint32 exported_fns = 3;
  uint32 types = 4;
}

message ReviewCallGraph {
  repeated ReviewCallGraphNode nodes = 1;
  repeated ReviewCallEdge edges = 2;
  repeated uint32 changed_fns = 3;
  repeated ReviewPackageShape packages = 4;
  bool truncated = 5;
}

// Naming-convention verdicts (case-style strings, not identifier lists).
message ReviewNamingFacts {
  string functions = 1;
  string variables = 2;
  string constants = 3;
  float exported_ratio = 4;
}

message ReviewCommitStyleFacts {
  float conventional_ratio = 1;
  uint32 subject_len_p50 = 2;
  uint32 subject_len_p95 = 3;
  float body_present_ratio = 4;
  uint32 sampled_commits = 5;
}

// A deterministic house-style fingerprint — distributions/ratios only, no source
// or identifiers. `files_scanned == 0` ⇒ the collector did not run.
message ReviewStyleFacts {
  float comment_density = 1;
  float doccomment_ratio = 2;
  bool indent_tabs = 3;
  uint32 line_len_p95 = 4;
  uint32 fn_len_median = 5;
  ReviewNamingFacts naming = 6;
  ReviewCommitStyleFacts commits = 7;
  bool diff_matches_style = 8;
  uint32 files_scanned = 9;
}

// One cheap-LLM summary of a changed function — SOFT (model-generated), bounded.
message ReviewFunctionSummary {
  string name = 1;
  string file = 2;
  string kind = 3;      // added | modified
  string summary = 4;
  string model = 5;
  uint32 duration_ms = 6;
}

message ReviewSummaryReport {
  repeated ReviewFunctionSummary summaries = 1;
  uint32 requested = 2;
  uint32 produced = 3;
  uint32 omitted = 4;
}

message ReviewCoChangePartner {
  string path = 1;
  double confidence = 2;
  uint32 co_occurrences = 3;
  bool in_diff = 4;
}

message ReviewCoChangeEntry {
  string path = 1;
  repeated ReviewCoChangePartner partners = 2;
}

message ReviewCoChangeReport {
  uint32 commits_scanned = 1;
  bool truncated = 2;
  repeated ReviewCoChangeEntry entries = 3;
  uint32 missing_partners = 4;
}

message ReviewFileChurn {
  string path = 1;
  uint32 commits = 2;
  uint32 unique_authors = 3;
  uint32 bus_factor = 4;
  double top_author_share = 5;
  string churn_trend = 6;
  double churn_slope = 7;
  uint64 total_churn = 8;
}

message ReviewChurnReport {
  uint32 commits_scanned = 1;
  repeated ReviewFileChurn files = 2;
}

message ReviewFileSalience {
  string file = 1;
  double centrality = 2;
  uint32 bus_factor = 3;
  bool churn_increasing = 4;
  string class = 5;
}

message ReviewSalienceReport {
  repeated ReviewFileSalience files = 1;
}

message ReviewFacts {
  ReviewMeta meta = 1;
  ReviewChangeSet change = 2;
  ReviewGitState git_state = 3;
  ReviewAnalysisReport analysis = 4;
  ReviewSignatureReport signatures = 5;
  ReviewCallGraph callgraph = 6;
  ReviewStyleFacts style = 7;
  ReviewSummaryReport summaries = 8;
  ReviewCoChangeReport cochange = 9;
  ReviewChurnReport churn = 10;
  ReviewSalienceReport salience = 11;
}
