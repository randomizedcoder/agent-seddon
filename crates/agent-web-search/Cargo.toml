[package]
name = "agent-web-search"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# Dispatcher + cache + ranking are always available; backends are per-provider.
default = ["websearch-brave", "websearch-searxng"]
# Brave Search API (requires an API key).
websearch-brave = ["dep:reqwest"]
# A self-hosted SearXNG instance (no key; the operator runs it).
websearch-searxng = ["dep:reqwest"]
# Injects a dhat global allocator for the allocation-budget leak test only.
dhat-heap = ["dep:dhat"]

[dependencies]
agent-core.workspace = true
agent-retry.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
reqwest = { workspace = true, optional = true }
dhat = { workspace = true, optional = true }

[dev-dependencies]
tokio.workspace = true
rstest.workspace = true
agent-testkit.workspace = true
iai-callgrind.workspace = true
tiny_http.workspace = true

# Deterministic instruction-count bench for normalize/dedup/rank (the CPU path;
# the HTTP backends are network-bound and are deliberately not benched).
[[bench]]
name = "rank"
harness = false
