# OTLP tracing demo — the MODEL GATEWAY process.
#
# Run:  agent --serve-provider --config config/otel-demo/gateway.toml
#
# Serves the real GLM provider over gRPC on 127.0.0.1:50051 (see [grpc.provider]).
# The loop process (loop.toml) dials it with provider = "grpc". Both export OTLP
# traces to the ClickStack collector under distinct service names, so one trace
# spans both processes.

[agent]
provider = "openai-compat"   # the concrete provider this gateway exposes
context  = "sliding-window"
policy   = "auto-approve"
max_tokens     = 8192
temperature    = 0.7
context_window = 131072
stream         = true

# The real model endpoint (copied from config/agent.toml).
[provider]
base_url     = "https://213.173.96.56:8000/v1"
model        = "/model"
api_key_file = "~/Downloads/runpod/glm/glm-api-key"
insecure_tls = true

# Bind address for `--serve-provider` (defaults to 127.0.0.1:50051 anyway).
[grpc.provider]
listen = "127.0.0.1:50051"

[telemetry]
# 127.0.0.1 (not "localhost") — the container maps 4317 on IPv4 only; "localhost"
# can resolve to IPv6 ::1 and fail to connect.
otlp_endpoint     = "http://127.0.0.1:4317"
otel_service_name = "agent-provider-gateway"
# HyperDX authenticates OTLP with the team's Ingestion API Key. Create a local
# account at http://localhost:8080, copy the key from Team Settings, and set it here
# (same key in loop.toml). See docs/tracing.md.
# otlp_headers = "authorization=<ingestion-key>"
