# Example wiring. Each string field under [agent] and [memory] selects a seam
# implementation (see DESIGN.md §5). Swap them to run experiments — no code edit.

[agent]
# Each name is resolved through the plugin registry (see docs/extending.md).
provider = "openai-compat"   # -> OpenAiCompatProvider ("anthropic" -> AnthropicProvider)
# "sliding-window" drops oldest turns; "summarizing-window" LLM-summarizes them
# (keeping the last `keep_recent_tokens` verbatim).
context  = "sliding-window"  # -> SlidingWindow ("summarizing-window" -> SummarizingWindow)
# SECURITY: "auto-approve" runs every tool call (incl. bash) with NO confirmation.
# Only safe for trusted goals/inputs. The built-in default is "interactive".
policy   = "auto-approve"    # -> AutoApprove  ("interactive" gates each tool call)

max_iterations = 12
max_tokens     = 8192        # reasoning models (GLM) need real headroom
temperature    = 0.7
context_window = 131072
reserve_output = 8192
keep_recent_tokens = 20000   # summarizing-window: recent history kept verbatim

# stream=true consumes the provider's incremental SSE stream and echoes assistant
# text live to stderr. Set false for the buffered path (an escape hatch for
# servers that misbehave on SSE; also the only path that reports token usage for
# openai-compat). parallel_tools runs a turn's parallel-safe tool calls at once.
stream         = true
parallel_tools = true

# Subagents: expose a `delegate` tool so the model can spawn child agents with
# an isolated context (they return only a final summary). Off by default —
# nested loops multiply token cost. subagent_max_depth bounds recursion.
subagents          = false
subagent_max_depth = 2

system_prompt = """
You are a coding agent operating in a terminal working directory. Use the
provided tools (bash, read_file, write_file, edit, grep, find, ls, search) to
inspect and modify files and to run commands. Prefer `edit` over rewriting whole
files, `search` (indexed full-text) to find code fast during planning, and
`grep`/`find`/`ls` to navigate. To work across branches without checking them out,
use the git tools: `git_read`/`git_tree`/`git_diff`/`git_grep`/`git_log` read any
revision, `git_branches`/`git_status` survey the repo, and `git_worktree`/
`git_checkpoint` materialize disposable checkouts and save private checkpoints.
Use `metrics` to inspect your own performance
(latency, token/tool counts, search index state). Work step by step: call a tool,
observe the result, then decide the next step. When the task is complete, reply
with a short plain-text summary and do not call any more tools.
"""

# --- provider examples ----------------------------------------------------
# openai-compat (shown): GLM / OpenAI / local vLLM / Ollama.
[provider]
base_url = "https://213.173.96.56:8000/v1"
model    = "/model"
# The API key is NOT stored in this repo. Resolution order: api_key (inline) >
# api_key_env (env var) > api_key_file (path). Here it's read from a file:
api_key_file = "~/Downloads/runpod/glm/glm-api-key"
# api_key_env = "AGENT_API_KEY"     # alternative: read from this env var
insecure_tls = true          # GLM server uses a self-signed cert
# version = "2023-06-01"       # Anthropic `anthropic-version` header (Anthropic only)
#
# To use Anthropic instead, set provider = "anthropic" above and:
#   [provider]
#   model        = "claude-opus-4-8"
#   api_key_env  = "ANTHROPIC_API_KEY"   # or api_key_file = "~/.anthropic-key"
#   # base_url defaults to https://api.anthropic.com/v1; version to 2023-06-01.

[memory]
backend       = "file"                    # whole store: FileEpisodic + FileSemantic (registry-selected)
episodic_path = ".agent/episodic.jsonl"   # append-only event log ("what happened")
semantic_dir  = ".agent/memory"           # curated markdown facts ("what is true")
recall_limit  = 5
# semantic    = "vector"                  # swap ONLY the semantic layer (composed w/ file episodic)
# distill     = true                      # opt in to model-backed episodic -> semantic promotion
#                                         # (off by default: no extra model call per run)

[tools]
# Empty list = every registered tool. Name a subset to restrict (must be
# registered, i.e. compiled in via cargo features). Note: MCP tools (below) are
# always added when their server is configured — this allowlist only filters the
# built-ins.
enabled = [
    "bash", "read_file", "write_file", "edit", "grep", "find", "ls", "search", "metrics",
    "git_read", "git_tree", "git_diff", "git_grep", "git_log", "git_branches", "git_status",
    "git_worktree", "git_checkpoint",
]

# High-performance code search (the SearchBackend seam). `backends` selects which
# backends front the single search interface (first = default; empty ⇒ ["tantivy"]);
# multiple lets you compare them head-to-head under Prometheus/tracing. The index
# lives under <repo>/.agent-seddon/index/<backend> unless `index_dir` overrides it.
# `auto_index` checks freshness on start and reindexes in the background if stale.
# See docs/components/search.md.
[search]
backends   = ["tantivy"]
index_dir  = ""              # empty ⇒ per-repo .agent-seddon/index/<backend>
auto_index = true

# Multi-branch git (the RepoBackend seam). One shared bare/mirror object DB fronts
# many disposable `git worktree`s, so the agent can read, diff and analyze code
# across branches without many full clones. `backend` selects the impl: "cli"
# (shells out to git — the default, zero extra deps) or "grpc" (a remote seam).
# The mirror/worktrees live under <repo>/.agent-seddon/ unless overridden.
# `push_policy` gates the only operation that leaves the sandbox (default "never":
# checkpoints stay in private local refs). See docs/components/git.md.
[git]
backend       = "cli"
mirror_dir    = ""           # empty ⇒ <repo>/.agent-seddon/mirror
worktrees_dir = ""           # empty ⇒ <repo>/.agent-seddon/worktrees
remote        = ""           # empty ⇒ infer from the checkout's origin
auto_fetch_secs = 0          # >0 ⇒ background-fetch the mirror if older than this
max_worktrees = 8
push_policy   = "never"      # never | checkpoint-only | explicit

# External MCP (Model Context Protocol) servers. Their tools are discovered at
# startup and registered as `mcp_<server>_<tool>`. Best-effort: a server that
# fails to start is logged and skipped. A server is stdio (has `command`) or
# HTTP (has `url`). Off unless you add a server here.
#
# [[mcp.servers]]                         # stdio: spawned as a subprocess
# name    = "filesystem"
# command = "npx"
# args    = ["-y", "@modelcontextprotocol/server-filesystem", "."]
# # env   = { SOME_KEY = "value" }
#
# [[mcp.servers]]                         # http: streamable-HTTP endpoint
# name    = "remote"
# url     = "https://mcp.example.com/mcp"
# # headers = { Authorization = "Bearer …" }

# Stream the full transaction history (agent_events), logs (agent_logs), and
# per-turn token usage (agent_usage) into ClickHouse, keyed by a per-run
# session_id. Off by default — start the container first with
# `nix run .#clickhouse-up`, then set enabled = true. Never blocks the loop: if
# ClickHouse is unreachable, rows are dropped and the .agent/episodic.jsonl log
# still holds the full record.
[telemetry]
enabled          = false
clickhouse_url   = "localhost:9000"   # native protocol (TCP), host:port
database         = "agent"
user             = "default"
password         = ""
stream_logs      = true       # also send tracing logs to agent_logs
batch_max_rows   = 256
flush_interval_ms = 1000
# Distributed tracing via OpenTelemetry, exported over OTLP/gRPC to the ClickStack
# OTEL collector. Independent of `enabled` above (that gates the native ClickHouse
# sink). Empty = no exporter (default). Set it to the collector's OTLP gRPC
# endpoint to turn it on:
# otlp_endpoint     = "http://localhost:4317"
# otel_service_name = "agent-seddon"       # service.name on exported spans

# Always-injected user context. Files in <dir>/prepend/ are folded into the
# system prompt; files in <dir>/append/ become a trailing message. Name files
# NNNN_something.md — the number orders them. See context.d/README.md.
[context_files]
dir = "context.d"

# Prometheus metrics about the running agent: loop-level counters (API calls,
# tokens, context size, tool calls, iterations, run outcome) plus per-component
# series recorded at each seam (provider request/TTFT, tool exec latency, memory
# recall/append, context assemble/compact, policy authorize). When enabled, a
# /metrics endpoint is served on `listen`; scrape it with Prometheus + Grafana
# (`nix run .#prometheus-up` / `.#grafana-up`, see docs/metrics.md). A
# `--serve-<seam>` process serves its own /metrics on the seam's port (9601-9605).
# Set `pushgateway` to also push on exit (useful for short one-shot runs).
[metrics]
enabled     = true
listen      = "127.0.0.1:9600"
pushgateway = ""                # e.g. "http://localhost:9091"
job         = "agent-seddon"

# gRPC seam transports. A seam set to `= "grpc"` (e.g. `[agent] provider = "grpc"`)
# dials `endpoint`; `agent --serve-<seam>` binds `listen`. Both default (when
# empty/omitted) to 127.0.0.1:<port> using the generated ports (provider 50051,
# memory 50052, tools 50053, context 50054, policy 50055, search 50056, repo 50057).
# Use `unix:/path` for a same-host, TCP-bypassing socket. See docs/grpc.md.
#
# [grpc.provider]
# endpoint = "unix:/tmp/agent-seddon/provider.sock"   # client dials this
# listen   = "unix:/tmp/agent-seddon/provider.sock"   # --serve-provider binds this
# [grpc.tools]
# endpoint = "http://tool-worker:50053"               # remote tool worker (opt-in)
# [grpc.repo]
# endpoint = "unix:/tmp/agent-seddon/repo.sock"       # a git gateway (backend = "grpc")
